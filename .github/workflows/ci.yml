name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  # Job 1: Code Quality Checks (runs first as it's fast)
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Code formatting check
      run: ./gradlew spotlessCheck --no-daemon --stacktrace

    - name: Static analysis (Detekt)
      run: ./gradlew detekt --no-daemon --stacktrace

    - name: Upload Detekt reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: detekt-reports
        path: |
          **/build/reports/detekt/
        retention-days: 7

  # Job 2: Build Desktop (JVM)
  build-desktop:
    name: Build Desktop (JVM)
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build JVM targets
      run: ./gradlew composeApp:jvmJar backend:build -x test --no-daemon --stacktrace

    - name: Run JVM tests
      run: ./gradlew composeApp:jvmTest shared:jvmTest backend:test --no-daemon --stacktrace

    - name: Upload JVM build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: jvm-artifacts
        path: |
          composeApp/build/libs/*.jar
          backend/build/libs/*.jar
        retention-days: 7

  # Job 3: Build Android
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Android targets
      run: ./gradlew composeApp:bundleAndroidMainAar shared:bundleAndroidMainAar -x test --no-daemon --stacktrace

    - name: Run Android tests
      run: ./gradlew composeApp:jvmTest shared:jvmTest --no-daemon --stacktrace
      continue-on-error: true

  # Job 4: Build iOS (if feasible)
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: code-quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Kotlin Native
      uses: actions/cache@v4
      with:
        path: ~/.konan
        key: ${{ runner.os }}-konan-${{ hashFiles('**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-konan-

    - name: Build iOS Framework
      run: ./gradlew composeApp:linkDebugFrameworkIosSimulatorArm64 shared:linkDebugFrameworkIosSimulatorArm64 --no-daemon --stacktrace

    - name: Run iOS tests
      run: ./gradlew composeApp:iosSimulatorArm64Test shared:iosSimulatorArm64Test --no-daemon --stacktrace

  # Job 5: Build Web (JS/Wasm)
  build-web:
    name: Build Web (JS/Wasm)
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build JS target
      run: ./gradlew composeApp:jsBrowserProductionWebpack shared:jsBrowserProductionWebpack --no-daemon --stacktrace

    - name: Build Wasm target
      run: ./gradlew composeApp:wasmJsBrowserProductionWebpack shared:wasmJsBrowserProductionWebpack --no-daemon --stacktrace

    - name: Run JS tests
      run: ./gradlew composeApp:jsTest shared:jsTest --no-daemon --stacktrace
      continue-on-error: true

  # Job 6: Test Coverage
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [build-desktop, build-android, build-web]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run all tests
      run: ./gradlew test --no-daemon --stacktrace

    - name: Generate Kover coverage report (Backend)
      run: ./gradlew backend:koverXmlReport backend:koverHtmlReport --no-daemon --stacktrace

    - name: Generate coverage badge
      uses: cicirello/jacoco-badge-generator@v2
      with:
        badges-directory: .github/badges
        generate-branches-badge: true
        generate-summary: true
        jacoco-csv-file: backend/build/reports/kover/reportJvm.xml
      continue-on-error: true

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: |
          backend/build/reports/kover/
        retention-days: 30

    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: madrapps/jacoco-report@v1.6.1
      with:
        paths: |
          ${{ github.workspace }}/backend/build/reports/kover/reportJvm.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 40
        min-coverage-changed-files: 60
      continue-on-error: true

  # Job 7: Integration Tests (if configured)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: false  # Enable when integration tests are configured

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run integration tests
      run: ./gradlew integrationTest --no-daemon --stacktrace

