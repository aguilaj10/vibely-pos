components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token received from `/api/auth/login` endpoint

  schemas:
    # ==================== ERROR & BASE SCHEMAS ====================
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message

    # ==================== AUTH SCHEMAS ====================
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          format: password
          description: User password

    RefreshTokenRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Refresh token received during login

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: JWT refresh token
        expires_in:
          type: integer
          format: int64
          description: Token expiration time in seconds
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: User unique identifier
        email:
          type: string
          format: email
          description: User email
        fullName:
          type: string
          description: User full name
        role:
          type: string
          enum: [admin, manager, cashier, warehouse, viewer]
          description: User role
        status:
          type: string
          enum: [active, inactive, suspended]
          description: User status
        createdAt:
          type: string
          format: date-time
          description: User creation timestamp
        lastLoginAt:
          type: string
          format: date-time
          description: Last login timestamp

    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer

    # ==================== PRODUCT SCHEMAS ====================
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sku:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        categoryId:
          type: string
          format: uuid
          nullable: true
        supplierId:
          type: string
          format: uuid
          nullable: true
        sellingPrice:
          type: number
          format: double
        costPrice:
          type: number
          format: double
          nullable: true
        currentStock:
          type: integer
        minStockLevel:
          type: integer
          nullable: true
        maxStockLevel:
          type: integer
          nullable: true
        reorderPoint:
          type: integer
          nullable: true
        unit:
          type: string
          nullable: true
        isActive:
          type: boolean
        taxRate:
          type: number
          format: double
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer

    CreateProductRequest:
      type: object
      required:
        - name
        - selling_price
        - current_stock
      properties:
        name:
          type: string
        sku:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        category_id:
          type: string
          format: uuid
          nullable: true
        supplier_id:
          type: string
          format: uuid
          nullable: true
        selling_price:
          type: number
          format: double
        cost_price:
          type: number
          format: double
          nullable: true
        current_stock:
          type: integer
        min_stock_level:
          type: integer
          nullable: true
        max_stock_level:
          type: integer
          nullable: true
        reorder_point:
          type: integer
          nullable: true
        unit:
          type: string
          nullable: true
        is_active:
          type: boolean
          default: true
        tax_rate:
          type: number
          format: double
          nullable: true

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        sku:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        category_id:
          type: string
          format: uuid
          nullable: true
        supplier_id:
          type: string
          format: uuid
          nullable: true
        selling_price:
          type: number
          format: double
          nullable: true
        cost_price:
          type: number
          format: double
          nullable: true
        min_stock_level:
          type: integer
          nullable: true
        max_stock_level:
          type: integer
          nullable: true
        reorder_point:
          type: integer
          nullable: true
        unit:
          type: string
          nullable: true
        is_active:
          type: boolean
          nullable: true
        tax_rate:
          type: number
          format: double
          nullable: true

    AdjustStockRequest:
      type: object
      required:
        - quantity
        - transaction_type
      properties:
        quantity:
          type: integer
          description: Positive to add, negative to remove
        transaction_type:
          type: string
          enum: [purchase, sale, adjustment, transfer]
        reference_type:
          type: string
          nullable: true
        reference_id:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true

    # ==================== CATEGORY SCHEMAS ====================
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CategoryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        is_active:
          type: boolean
          default: true

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        is_active:
          type: boolean
          nullable: true

    # ==================== SALE SCHEMAS ====================
    Sale:
      type: object
      properties:
        id:
          type: string
          format: uuid
        saleNumber:
          type: string
        cashierId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
          nullable: true
        subtotal:
          type: number
          format: double
        taxAmount:
          type: number
          format: double
        discountAmount:
          type: number
          format: double
        totalAmount:
          type: number
          format: double
        status:
          type: string
          enum: [completed, refunded, cancelled]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    SaleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Sale'
