<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Vibely POS — App Icon Mark
    Design: Geometric "V" with a three-bar pulse/spark at the apex.
    The V arms are bold with rounded caps. The spark suggests energy and
    the "vibely" brand personality. Reads clearly at 48×48px.
    Primary color: #111827 (near-black brand color)
  -->

  <!-- V left arm: top-left down to apex -->
  <line
    x1="14" y1="18"
    x2="50" y2="72"
    stroke="#111827"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- V right arm: top-right down to apex -->
  <line
    x1="86" y1="18"
    x2="50" y2="72"
    stroke="#111827"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Spark / pulse bars at the apex — three vertical bars of descending height,
       centered just above the V's lowest point. They sit slightly inside the V
       like a signal strength indicator, reinforcing "vibely" energy. -->
  <!-- Bar 1 (left, shortest) -->
  <rect x="38" y="59" width="5" height="10" rx="2.5" fill="#1D4ED8" />
  <!-- Bar 2 (center, tallest) -->
  <rect x="47.5" y="53" width="5" height="16" rx="2.5" fill="#1D4ED8" />
  <!-- Bar 3 (right, medium) -->
  <rect x="57" y="56" width="5" height="13" rx="2.5" fill="#1D4ED8" />
</svg>
