<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <!--
    Vibely POS — Full Wordmark
    Layout: Icon mark (80×80 canvas scaled to fit 60px tall) + "Vibely POS" text
    Horizontal composition, looks great at 200–400px wide.
    Brand colors: #111827 (near-black), #1D4ED8 (accent blue)
  -->

  <!-- ==================== ICON MARK (left, 64px tall in a 70px column) ==================== -->
  <!-- Translated and scaled from 100×100 viewBox down to fit a 56×56 area at x=7, y=12 -->
  <g transform="translate(7, 12) scale(0.56)">
    <!-- V left arm -->
    <line
      x1="14" y1="18"
      x2="50" y2="72"
      stroke="#111827"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- V right arm -->
    <line
      x1="86" y1="18"
      x2="50" y2="72"
      stroke="#111827"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Spark bars -->
    <rect x="38" y="59" width="5" height="10" rx="2.5" fill="#1D4ED8" />
    <rect x="47.5" y="53" width="5" height="16" rx="2.5" fill="#1D4ED8" />
    <rect x="57" y="56" width="5" height="13" rx="2.5" fill="#1D4ED8" />
  </g>

  <!-- ==================== WORDMARK TEXT ==================== -->
  <!-- "Vibely" — bold weight, near-black -->
  <text
    x="76"
    y="52"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="32"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#111827"
  >Vibely</text>

  <!-- "POS" — regular weight, accent blue, visually separated -->
  <text
    x="76"
    y="68"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="500"
    letter-spacing="3"
    fill="#1D4ED8"
  >POS</text>

  <!-- Thin separator line between icon and text -->
  <line
    x1="68" y1="18"
    x2="68" y2="62"
    stroke="#E5E7EB"
    stroke-width="1"
  />
</svg>
