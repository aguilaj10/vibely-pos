<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Vibely POS — Web Favicon
    Optimized for 32×32 rendering. Strokes are slightly heavier relative to canvas
    to ensure the V reads clearly at small browser tab sizes.
    Background: #F8FAFC (off-white) to match the app background.
    Mark: #111827 V with #1D4ED8 spark bars.
  -->

  <!-- Background square with slightly rounded corners -->
  <rect width="32" height="32" rx="6" fill="#F8FAFC"/>

  <!-- V left arm -->
  <line
    x1="5" y1="7"
    x2="16" y2="24"
    stroke="#111827"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- V right arm -->
  <line
    x1="27" y1="7"
    x2="16" y2="24"
    stroke="#111827"
    stroke-width="3.5"
    stroke-linecap="round"
  />

  <!-- Spark bars (scaled down, still readable at 32px) -->
  <!-- Bar 1 (left, shortest) -->
  <rect x="12" y="19" width="2" height="4" rx="1" fill="#1D4ED8" />
  <!-- Bar 2 (center, tallest) -->
  <rect x="15" y="17" width="2" height="6" rx="1" fill="#1D4ED8" />
  <!-- Bar 3 (right, medium) -->
  <rect x="18" y="18" width="2" height="5" rx="1" fill="#1D4ED8" />
</svg>
